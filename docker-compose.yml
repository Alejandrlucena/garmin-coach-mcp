services:
  mcp:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - garmin-data:/data
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../garmin-entreno/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp
    restart: unless-stopped

volumes:
  garmin-data:
